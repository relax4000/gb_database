<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GB Blockchain Viewer</title>

<style>
body {
    margin: 0;
    background-color: #f4f1ea;
    background-image:
        repeating-linear-gradient(45deg, rgba(0,0,0,0.01), rgba(0,0,0,0.01) 1px, transparent 1px, transparent 10px),
        repeating-linear-gradient(-45deg, rgba(0,0,0,0.01), rgba(0,0,0,0.01) 1px, transparent 1px, transparent 10px);
    color: #2b2b2b;
    font-family: "Courier New", monospace;
}

.container {
    width: 600px;
    max-width: 95%;
    margin: 40px auto;
    text-align: center;

    border: 3px solid #2b2b2b;
    padding: 30px;
    background: #fffdf7;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.25);
}

h1 {
    margin-bottom: 20px;
    text-shadow: none;
    border-bottom: 2px solid #2b2b2b;
    padding-bottom: 6px;
}

input {
    width: 80%;
    padding: 10px;
    background: #fff;
    border: 2px solid #2b2b2b;
    color: #2b2b2b;
    font-family: inherit;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    background: #c7a94f;
    border: 2px solid #2b2b2b;
    color: #2b2b2b;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 2px 2px 0 #2b2b2b;
}

button:hover {
    background: #b8963d;
}

.output {
    margin-top: 20px;
    text-align: left;
    background: #fff;
    padding: 15px;
    border: 2px solid #2b2b2b;
    max-height: 400px;
    overflow-y: auto;
}

.blink {
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
    <h1>🎮 GB Viewer</h1>

    <input type="text" id="txid" placeholder="Wklej TXID"
           onkeypress="if(event.key==='Enter') sprawdzTx()">
    <br>
    <button onclick="sprawdzTx()">Szukaj</button>

    <div id="output" class="output">
        <span class="blink">▌</span>
    </div>
</div>

<script>
function hexToString(hex) {
    let str = '';
    for (let i = 0; i < hex.length; i += 2) {
        str += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
    }
    return str;
}

function safe(v) {
    return v ?? "-";
}

function fetchTx(txid) {
    return fetch(`https://api.whatsonchain.com/v1/bsv/test/tx/hash/${txid}`)
        .then(res => {
            if (res.status === 404) {
                return fetch(`https://api.whatsonchain.com/v1/bsv/main/tx/hash/${txid}`);
            }
            return res;
        });
}

function sprawdzTx() {
    const txid = document.getElementById("txid").value.trim();
    const output = document.getElementById("output");

    if (!txid) {
        output.innerHTML = "❌ Podaj TXID";
        return;
    }

    output.innerHTML = "⏳ Ładowanie...";

    fetchTx(txid)
        .then(res => {
            if (res.status === 404) throw new Error("TX nie istnieje");
            if (!res.ok) throw new Error("Błąd API");
            return res.json();
        })
        .then(data => {

            if (!data.vout) {
                throw new Error("Brak vout w TX");
            }

            let found = null;

            for (let vout of data.vout) {
                const parts = vout.scriptPubKey?.opReturn?.parts;
                if (!parts) continue;

                for (let part of parts) {

                    // JSON bezpośrednio
                    try {
                        found = JSON.parse(part);
                        break;
                    } catch (e) {}

                    // HEX → JSON
                    try {
                        if (/^[0-9a-fA-F]+$/.test(part)) {
                            let decoded = hexToString(part);
                            found = JSON.parse(decoded);
                            break;
                        }
                    } catch (e) {}
                }

                if (found) break;
            }

            if (!found) {
                throw new Error("Brak danych gry");
            }

            output.innerHTML = `
                <h3>${safe(found.tytul)}</h3>
                ID: ${safe(found.id)} <br>
                Rok: ${safe(found.rok_wydania)} <br><br>
            
                [OBUDOWA]<br>
                Kod: ${safe(found.obudowa?.kod)}<br>
                Wytłoczenie: ${safe(found.obudowa?.kod_wytloczenia)}<br>
                Przód: ${safe(found.obudowa?.kod_obudowy_przod)}<br>
                Tył: ${safe(found.obudowa?.kod_obudowy_tyl)}<br><br>
            
                [PCB]<br>
                Kod PCB: ${safe(found.pcb?.kod_pcb)}<br><br>
            
                [ROM]<br>
                Kod: ${safe(found.pcb?.rom?.rom_kod)}<br>
                Producent: ${safe(found.pcb?.rom?.rom_producent)}<br>
                Data INT: ${safe(found.pcb?.rom?.rom_data_int)}<br>
                Data Serial: ${safe(found.pcb?.rom?.rom_data_serial)}<br><br>
            
                [MBC]<br>
                Kod: ${safe(found.pcb?.mbc?.mbc_kod)}<br>
                Data INT: ${safe(found.pcb?.mbc?.mbc_data_int)}<br>
                Data Serial: ${safe(found.pcb?.mbc?.mbc_data_serial)}<br><br>
            
                Metoda inspekcji: ${safe(found.metoda_inspekcji)}<br>
                Data wpisu: ${safe(found.data_wpisu)}
            `;
        })
        .catch(err => {
            output.innerHTML = "❌ " + err.message;
        });
}
</script>

</body>
</html>
