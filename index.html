<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GB Blockchain Viewer</title>

<style>
    body {
        margin: 0;
        background: #0f380f;
        color: #9bbc0f;
        font-family: "Courier New", monospace;
    }

    .container {
        width: 600px;
        max-width: 95%;
        margin: 40px auto; /* 👈 zamiast centrowania */
        text-align: center;

        border: 3px solid #9bbc0f;
        padding: 30px;
        background: #306230;
        box-shadow: 0 0 20px #9bbc0f;
    }

    h1 {
        margin-bottom: 20px;
        text-shadow: 0 0 5px #9bbc0f;
    }

    input {
        width: 80%;
        padding: 10px;
        background: #0f380f;
        border: 2px solid #9bbc0f;
        color: #9bbc0f;
        font-family: inherit;
    }

    button {
        margin-top: 10px;
        padding: 10px 20px;
        background: #9bbc0f;
        border: none;
        color: #0f380f;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        background: #8bac0f;
    }

    .output {
        margin-top: 20px;
        text-align: left;
        background: #0f380f;
        padding: 15px;
        border: 2px solid #9bbc0f;
        max-height: 400px;
        overflow-y: auto;
    }

    .blink {
        animation: blink 1s infinite;
    }

    @keyframes blink {
        50% { opacity: 0; }
    }
</style>
</head>

<body>

<div class="container">
    <h1>🎮 GB Viewer</h1>

    <input type="text" id="txid" placeholder="Wklej TXID"
           onkeypress="if(event.key==='Enter') sprawdzTx()">
    <br>
    <button onclick="sprawdzTx()">Szukaj</button>

    <div id="output" class="output">
        <span class="blink">▌</span>
    </div>
</div>

<script>
function sprawdzTx() {
    const txid = document.getElementById("txid").value.trim();
    const output = document.getElementById("output");

    if (!txid) {
        output.innerHTML = "❌ Podaj TXID";
        return;
    }

    output.innerHTML = "⏳ Ładowanie...";

    fetch(`https://api.whatsonchain.com/v1/bsv/test/tx/hash/${txid}`)
        .then(res => {
            if (!res.ok) throw new Error("Nie znaleziono TX");
            return res.json();
        })
        .then(data => {

            let found = null;

            for (let vout of data.vout) {
                if (vout.scriptPubKey?.opReturn?.parts) {
                    for (let part of vout.scriptPubKey.opReturn.parts) {
                        try {
                            found = JSON.parse(part);
                            break;
                        } catch (e) {}
                    }
                }
                if (found) break;
            }

            if (!found) {
                output.innerHTML = "❌ Brak danych gry";
                return;
            }

            output.innerHTML = `
                <h3>${found.tytul}</h3>
                ID: ${found.id} <br>
                Rok: ${found.rok_wydania} <br><br>
            
                [OBUDOWA]<br>
                Kod: ${found.obudowa.kod}<br>
                Wytłoczenie: ${found.obudowa.kod_wytloczenia}<br>
                Przód: ${found.obudowa.kod_obudowy_przod}<br>
                Tył: ${found.obudowa.kod_obudowy_tyl}<br><br>
            
                [PCB]<br>
                Kod PCB: ${found.pcb.kod_pcb}<br><br>
            
                [ROM]<br>
                Kod: ${found.pcb.rom.rom_kod}<br>
                Producent: ${found.pcb.rom.rom_producent}<br>
                Data INT: ${found.pcb.rom.rom_data_int}<br>
                Data Serial: ${found.pcb.rom.rom_data_serial}<br><br>
            
                [MBC]<br>
                Kod: ${found.pcb.mbc.mbc_kod}<br>
                Data INT: ${found.pcb.mbc.mbc_data_int}<br>
                Data Serial: ${found.pcb.mbc.mbc_data_serial}<br><br>
            
                Metoda inspekcji: ${found.metoda_inspekcji}<br>
                Data wpisu: ${found.data_wpisu}
            `;
        })
        .catch(err => {
            output.innerHTML = "❌ " + err.message;
        });
}
</script>

</body>
</html>
